<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Strona &middot; testy</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <!-- sekcja "Header" -->
    <header class="header">
      <h1>header</h1>
      <h1>.</h1>
      <h1>.</h1>
    </header>

    <main>
      <!-- sekcja "Hero" -->
      <section class="section__hero">
        <div class="hero__container">
          <video class="hero__video" autoplay muted playsinline preload="none">
            <source src="video/AdobeStock_613341774.mp4" type="video/mp4" />
          </video>

          <div class="hero__overlay"></div>

          <div class="hero__content reveal reveal--zoom">
            <div class="hero__content__top-block">
              <img
                src="/img/logo_georaster_enhcd_CG.webp"
                class="hero__content__top-block__logo appear appear--up"
                alt="logo Georaster"
              />
            </div>
            <div class="hero__content__bottom-block">
              <h1 class="hero__content__bottom-block__hero__title">
                GEORASTER
              </h1>
              <p class="hero__content__bottom-block__hero__text">
                Jacek Łęgowski
              </p>
            </div>
          </div>
        </div>
      </section>

      <section class="section__services">
        <div class="services__container">
          <div class="services__overlay"></div>
          <div class="services__blocks">
            <div class="services__blocks__row slide slide--fast slide--left">
              <div class="services__blocks__row__cell">Wytyczenia budynków</div>
              <div class="services__blocks__row__cell">Wznowienia granic</div>
              <div class="services__blocks__row__cell">
                Inwentaryzacja budynków
              </div>
              <div class="services__blocks__row__cell">Mapy pod budowę</div>
              <div class="services__blocks__row__cell">Wznowienia granic</div>
            </div>
            <div
              class="services__blocks__row services__blocks__row--big-gap slide slide--left"
            >
              <div class="services__blocks__row__cell">Wytyczenia budynków</div>
              <div class="services__blocks__row__cell">
                Inwentaryzacja budynków
              </div>
            </div>
            <div class="services__blocks__row slide slide--slow slide--left">
              <div class="services__blocks__row__cell">Wytyczenia budynków</div>
              <div class="services__blocks__row__cell">Mapy pod budowę</div>
              <div class="services__blocks__row__cell">Wznowienia granic</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer" id="footer">
      <p>footer</p>
    </footer>
    <script src="js/animations/servicesSlide.js" defer></script>
    <script src="js/animations/contentAppear.js" defer></script>
    <script src="js/animations/reveal.js" defer></script>
  </body>
</html>
